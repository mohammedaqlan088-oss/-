<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        * { box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        /* الاسم في الخلفية بشكل جمالي */
        body::before {
            content: "عقلان";
            position: fixed;
            top: 30%;
            font-size: 25vw;
            color: rgba(255, 255, 255, 0.015);
            white-space: nowrap;
            z-index: -1;
            transform: rotate(-15deg);
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 20px 10px;
        }

        /* عنوان النظام في الأعلى */
        .system-header {
            text-align: center;
            padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 10px;
        }

        .system-header h2 {
            font-size: 1.2rem;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.6);
            margin: 0;
        }

        .room-section {
            background: rgba(255, 255, 255, 0.07);
            padding: 25px 20px;
            border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
        }

        .room-title {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #f1c40f;
            font-weight: bold;
            display: block;
        }

        .btn-group {
            display: flex;
            gap: 15px;
        }

        button {
            padding: 22px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: white;
            flex: 1;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        #gateBtn {
            width: 100%;
            background: linear-gradient(45deg, #3498db, #2980b9);
        }

        .btn-on { background: linear-gradient(45deg, #2ecc71, #27ae60); }
        .btn-off { background: linear-gradient(45deg, #e74c3c, #c0392b); }

        button:active { transform: scale(0.92); filter: brightness(1.2); }

        /* التذييل الجديد (الاسم والرقم في الأسفل) */
        footer {
            margin-top: auto;
            text-align: center;
            padding: 30px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        footer h1 {
            font-size: 1.4rem;
            margin: 0 0 10px 0;
            color: #fff;
            text-shadow: 0 0 15px rgba(0,212,255,0.3);
        }

        .phone-link {
            color: #00d4ff;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: bold;
            display: inline-block;
            padding: 5px 15px;
            border: 1px dashed rgba(0,212,255,0.3);
            border-radius: 10px;
        }

        .footer-deco-text {
            display: block;
            margin-top: 15px;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.2);
            letter-spacing: 3px;
        }

        @media (max-width: 480px) {
            button { padding: 18px; font-size: 1.1rem; }
            footer h1 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="system-header">
            <h2>⚡ SMART CONTROL SYSTEM ⚡</h2>
        </div>

        <div class="room-section" style="border-right: 5px solid #3498db;">
            <span class="room-title" style="color: #3498db;">البوابة العامة</span>
            <button id="gateBtn" onclick="toggleGate()">فتح البوابة</button>
        </div>

        <div class="room-section" style="border-right: 5px solid #2ecc71;">
            <span class="room-title">الغرفة (1)</span>
            <div class="btn-group">
                <button class="btn-on" onclick="send('1N')">تشغيل</button>
                <button class="btn-off" onclick="send('1F')">إطفاء</button>
            </div>
        </div>

        <div class="room-section" style="border-right: 5px solid #f1c40f;">
            <span class="room-title">الغرفة (2)</span>
            <div class="btn-group">
                <button class="btn-on" onclick="send('2N')">تشغيل</button>
                <button class="btn-off" onclick="send('2F')">إطفاء</button>
            </div>
        </div>

        <footer>
            <h1>✧ المهندس محمد عقلان ✧</h1>
            <a href="tel:777830743" class="phone-link">☏ 777830743</a>
            <span class="footer-deco-text">━━━━━ DESIGNED BY AQLAN ━━━━━</span>
        </footer>
    </div>

    <script>
        const client = mqtt.connect('wss://broker.hivemq.com:8884/mqtt');
        let isGateOpen = false;

        function toggleGate() {
            const btn = document.getElementById('gateBtn');
            if (!isGateOpen) {
                send('ON'); 
                btn.innerHTML = "إغلاق البوابة";
                btn.style.background = "linear-gradient(45deg, #e67e22, #d35400)";
                isGateOpen = true;
            } else {
                send('OFF'); 
                btn.innerHTML = "فتح البوابة";
                btn.style.background = "linear-gradient(45deg, #3498db, #2980b9)";
                isGateOpen = false;
            }
        }

        function send(msg) { 
            client.publish('1drone/commands', msg); 
            console.log("Sent: " + msg);
        }
    </script>
</body>
</html>
