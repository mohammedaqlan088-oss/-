<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        * { box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 5px; /* تقليل الحواف الخارجية */
            display: flex;
            justify-content: center;
            align-items: center; /* توسيط المحتوى عمودياً */
            min-height: 100vh;
            overflow: hidden; /* منع التمرير إذا كان المحتوى مناسباً */
        }

        .container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 10px; /* تقليل المسافة بين البلوكات */
            padding: 10px;
        }

        .system-header {
            text-align: center;
            padding: 5px;
            margin-bottom: 5px;
        }

        .system-header h2 {
            font-size: 1rem;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.5);
            margin: 0;
        }

        .room-section {
            background: rgba(255, 255, 255, 0.07);
            padding: 15px; /* تقليل الحشو الداخلي للبلوك */
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .room-title {
            font-size: 1.1rem;
            margin-bottom: 12px; /* تقليل المسافة تحت العنوان */
            color: #f1c40f;
            font-weight: bold;
            display: block;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 15px; /* تقليل حجم الأزرار قليلاً */
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: white;
            flex: 1;
        }

        #gateBtn {
            width: 100%;
            background: linear-gradient(45deg, #3498db, #2980b9);
        }

        .btn-on { background: linear-gradient(45deg, #2ecc71, #27ae60); }
        .btn-off { background: linear-gradient(45deg, #e74c3c, #c0392b); }

        button:active { transform: scale(0.95); }

        footer {
            margin-top: 5px;
            text-align: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        footer h1 {
            font-size: 1.1rem;
            margin: 0 0 5px 0;
            color: #fff;
        }

        .phone-link {
            color: #00d4ff;
            text-decoration: none;
            font-size: 1rem;
            font-weight: bold;
        }

        .footer-deco-text {
            display: block;
            margin-top: 8px;
            font-size: 0.6rem;
            color: rgba(255,255,255,0.2);
        }

        /* تحسين إضافي للشاشات الصغيرة جداً */
        @media (max-height: 700px) {
            .container { gap: 8px; }
            .room-section { padding: 10px; }
            button { padding: 12px; }
            .room-title { margin-bottom: 8px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="system-header">
            <h2>⚡ SMART CONTROL SYSTEM ⚡</h2>
        </div>

        <div class="room-section" style="border-right: 5px solid #3498db;">
            <span class="room-title" style="color: #3498db;">البوابة العامة</span>
            <button id="gateBtn" onclick="toggleGate()">فتح البوابة</button>
        </div>

        <div class="room-section" style="border-right: 5px solid #2ecc71;">
            <span class="room-title">الغرفة (1)</span>
            <div class="btn-group">
                <button class="btn-on" onclick="send('1N')">تشغيل</button>
                <button class="btn-off" onclick="send('1F')">إطفاء</button>
            </div>
        </div>

        <div class="room-section" style="border-right: 5px solid #f1c40f;">
            <span class="room-title">الغرفة (2)</span>
            <div class="btn-group">
                <button class="btn-on" onclick="send('2N')">تشغيل</button>
                <button class="btn-off" onclick="send('2F')">إطفاء</button>
            </div>
        </div>

        <footer>
            <h1>✧ المهندس محمد عقلان ✧</h1>
            <a href="tel:777830743" class="phone-link">☏ 777830743</a>
            <span class="footer-deco-text">━━━━━ DESIGNED BY AQLAN ━━━━━</span>
        </footer>
    </div>

    <script>
        const client = mqtt.connect('wss://broker.hivemq.com:8884/mqtt');
        let isGateOpen = false;

        function toggleGate() {
            const btn = document.getElementById('gateBtn');
            if (!isGateOpen) {
                send('ON'); 
                btn.innerHTML = "إغلاق البوابة";
                btn.style.background = "linear-gradient(45deg, #e67e22, #d35400)";
                isGateOpen = true;
            } else {
                send('OFF'); 
                btn.innerHTML = "فتح البوابة";
                btn.style.background = "linear-gradient(45deg, #3498db, #2980b9)";
                isGateOpen = false;
            }
        }

        function send(msg) { 
            client.publish('1drone/commands', msg); 
            console.log("Sent: " + msg);
        }
    </script>
</body>
</html>
