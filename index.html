<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* الاسم في الخلفية */
        body::before {
            content: "المهندس محمد عقلان";
            position: fixed;
            font-size: 8vw;
            color: rgba(255, 255, 255, 0.02);
            white-space: nowrap;
            z-index: -1;
            transform: rotate(-15deg);
            pointer-events: none;
        }

        .container {
            width: 95%;
            max-width: 1200px; /* الحجم الأقصى لعرض الصفحة */
            background: rgba(255, 255, 255, 0.03);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }

        header {
            margin-bottom: 40px;
        }

        h1 { font-size: 2.5rem; margin-bottom: 10px; color: #fff; text-shadow: 0 0 10px rgba(0,212,255,0.5); }
        
        .phone-link {
            color: #00d4ff;
            text-decoration: none;
            font-size: 1.2rem;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        .phone-link:hover { text-shadow: 0 0 10px #00d4ff; }

        /* توزيع الأزرار بشكل شبكة */
        .controls-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }

        .room-section {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.08);
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .room-section:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-5px);
        }

        .room-title {
            font-size: 1.4rem;
            margin-bottom: 20px;
            color: #f1c40f;
            font-weight: bold;
        }

        .btn-group {
            display: flex;
            gap: 15px;
        }

        button {
            padding: 18px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: white;
            flex: 1;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* ألوان الأزرار */
        #gateBtn {
            background: linear-gradient(45deg, #3498db, #2980b9);
            width: 100%;
        }

        .btn-on { background: linear-gradient(45deg, #2ecc71, #27ae60); }
        .btn-off { background: linear-gradient(45deg, #e74c3c, #c0392b); }

        button:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.4); }
        button:active { transform: scale(0.95); }

        .footer-deco {
            margin-top: 50px;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.4);
            letter-spacing: 2px;
        }

        /* للهواتف الصغيرة */
        @media (max-width: 600px) {
            .container { padding: 20px; }
            h1 { font-size: 1.8rem; }
            .controls-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>✧ المهندس محمد عقلان ✧</h1>
            <a href="tel:777830743" class="phone-link">☏ 777830743</a>
        </header>

        <div class="controls-grid">
            <div class="room-section" style="border-top: 4px solid #3498db;">
                <div class="room-title" style="color: #3498db;">البوابة العامة</div>
                <button id="gateBtn" onclick="toggleGate()">فتح البوابة</button>
            </div>

            <div class="room-section" style="border-top: 4px solid #2ecc71;">
                <div class="room-title">الغرفة (1)</div>
                <div class="btn-group">
                    <button class="btn-on" onclick="send('1N')">تشغيل</button>
                    <button class="btn-off" onclick="send('1F')">إطفاء</button>
                </div>
            </div>

            <div class="room-section" style="border-top: 4px solid #f1c40f;">
                <div class="room-title">الغرفة (2)</div>
                <div class="btn-group">
                    <button class="btn-on" onclick="send('2N')">تشغيل</button>
                    <button class="btn-off" onclick="send('2F')">إطفاء</button>
                </div>
            </div>
        </div>

        <div class="footer-deco">
            ━━━━━ ⚡ SMART CONTROL SYSTEM ⚡ ━━━━━
        </div>
    </div>

    <script>
        // إعداد الاتصال
        const client = mqtt.connect('wss://broker.hivemq.com:8884/mqtt');
        let isGateOpen = false;

        client.on('connect', () => {
            console.log('Connected to MQTT Broker');
        });

        function toggleGate() {
            const btn = document.getElementById('gateBtn');
            if (!isGateOpen) {
                send('ON'); 
                btn.innerHTML = "إغلاق البوابة";
                btn.style.background = "linear-gradient(45deg, #e67e22, #d35400)";
                isGateOpen = true;
            } else {
                send('OFF'); 
                btn.innerHTML = "فتح البوابة";
                btn.style.background = "linear-gradient(45deg, #3498db, #2980b9)";
                isGateOpen = false;
            }
        }

        function send(msg) { 
            client.publish('1drone/commands', msg); 
            console.log("Sent Payload: " + msg);
        }
    </script>
</body>
</html>
