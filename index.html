<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>
    /* إضافة تأثير الضغط لجميع الأزرار */
    button:active {
        transform: scale(0.92); /* تصغير الحجم بنسبة بسيطة عند النقر */
        opacity: 0.8;           /* تقليل الشفافية قليلاً */
    }
    
    button {
        transition: transform 0.1s; /* تنعيم حركة الضغطة */
        cursor: pointer;
        border: none;
        border-radius: 8px;
        font-weight: bold;
    }
</style>

<body style="text-align:center; padding:50px">
    <button onclick="send('ON')" style="background:green; color:white; padding:20px">تشغيل</button>
    <button onclick="send('OFF')" style="background:red; color:white; padding:20px">إطفاء</button>

    <script>
        const client = mqtt.connect('wss://broker.hivemq.com:8884/mqtt');
        function send(msg) { client.publish('1drone/commands', msg); }
    </script>
</body>
